<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Suakanya">
    <title>Intro HTML</title>
    <style>
        /*mobile first appproch*/
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color:#1e1a19;
            padding: 20px;
            min-height: 100vh;
        }
        .container{
            max-width: 1200px;
            margin: 0 auto;
        }
        h1{
            color: crimson;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;

        }
        .card{
            color: aqua;
            border-radius:10px ;
            padding:25px ;
            flex: 1;
            min-width:200px ;
            box-shadow:0px 4px 6px rgba(229, 8, 8, 0.4);
            transition: transform 0.3s;

        }
        .h2-custom{
            color: rgb(8, 221, 136);
            margin-bottom: 25px;
            text-align: center;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
           
        }
        .card:hover{
            transform:translateX(-5px);
            box-shadow: 0 8px 15px rgba(244, 220, 6, 0.3);
        }
        .form-grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group{
            display: flex;
            flex-direction: column;
        }
        .form-group.full-width{
            grid-column: 1/-1;
        }
        label{
            color: crimson;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input,
        select,
        textarea{
            padding: 10px;
            border: 2px solid rgb(6, 37, 99);
            border-radius: 15px;
            font-size: 1rem;
            transition: border 0,3s;
            font-family: Arial;
           
           
        }
        input:focus,
        select:focus,
        textarea:focus{
            outline: none;
            border-color:rgb(3, 51, 25) ;
            box-shadow: 0 4px 8px rgb(227, 114, 21);
            transform:translateY(-5px);
        }
        textarea{
            resize: vertical;
            min-height: 100px;
        }
        .checkbox-group,
        .radio-group{
            display: flex;
            gap: 20px;
            flex-wrap: wrap;

        }
        .checkbox-item,
        .radio-item{
            display: flex;
            text-align: center;
            gap: 8px;

        }
        input[type="checkbox"]{
            width: 18px;
            height: 18px;
            cursor: pointer;

        }
        .btn-group{
            display: flex;
            gap:15px;
            margin-top:20px;
        }
        button{
            border: none;
            padding: 11px 28px ;
            border-radius: 10px;
            border-color:rgb(3, 51, 25) ;
            font-size: 1rem;
            cursor: pointer;
            transform: all 0.3s ;
            font-weight:bold ;
        }
        .btn-primary{
            background-color: rgba(1, 24, 43, 0.947);
            color: white;
        }
        .btn-primary:hover{
            background-color: rgba(1, 24, 43, 0.947);
            transform: translateY(-3px);
        }
        .btn-seconadary{
            background-color: rgba(1, 24, 43, 0.947);
            color: white;
        }
        .btn-seconadary:hover{
            background-color: rgba(1, 24, 43, 0.947);
            transform: translateY(-3px);
        }
        @media(max-width:780px){
            h1{
                font-size: 1.5rem;
            }

            .form-grid{
                grid-template-columns: 1fr;
            }
            .card{
                min-width: 100%;
            }

            .btn-group{
                flex-direction: column;
            }
            button{
                width: 100%;
            }
        }
        @media(max-width:480px){
            body{
                padding: 10px;
            }
            .card{
                padding: 20px;
            }
        }
        </style>
        </head>
        <body class="barriecito-regular">
            <a href="../index.html">Topic Home</a>
            <div class="container">
                <div class="card">
                    <form  id="my-form">
                        <h2 class="h2-custom">Submission Form</h2>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="firstName">First Name *</label>
                                <input type="text" id="firstName" name="first_name" placeholder="Enter your Firstname" required/>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name *</label>
                                <input type="text" id="lastName" name="last_name" placeholder="Enter your Lasttname" required/>
                            </div>
                            <div class="form-group">
                                <label for="emailId">EmailId *</label>
                                <input type="email" id="emailid" name="Email_Id" placeholder="Enter your EmailId" required/>
                            </div>
                            <div class="form-group">
                                <label for="phonenumber">Phone Number *</label>
                                <input type="tel" id="phoneno" name="phone_number" placeholder="Enter your phonenumber" required/>
                            </div>
                            <div class="form-group">
                                <label for="dob">Date of Birth *</label>
                                <input type="date" id="dob" name="dob"/>
                            </div>
                            <div class="form-group">
                                <label for="course">Select your Course</label>
                                <select id="course" name="course" required>
                                    <option value="">Choose Your Course</option>
                                    <option value="Cybersecurity">Cyber Security</option>
                                    <option value="fullstackdeveloper">fullstack Developer</option>
                                    <option value="GenerativeAI">Generative AI</option>  
                                </select>
                            </div>
                            <div class="form-group full-width">
                                <label>Gender</label>
                                <div class="radio-group">
                                    <div class="radio-item">
                                        <input type="radio" id="male" name="gender" value="male"/>
                                        <label for="male">Male</label>
                                    </div>
                                    <div class="radio-item">
                                        <input type="radio" id="female" name="gender" value="female"/>
                                        <label for="female">FeMale</label>
                                    </div>
                                    <div class="radio-item">
                                        <input type="radio" id="other" name="gender" value="other"/>
                                        <label for="other">Other</label>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group full-width">
                                <label>Interests</label>
                                <div class="checkbox-group">
                                    <div class="checkbox-item">
                                        <input type="checkbox" id="web" name="Interests" value="web"/>
                                        <label for="web">Web Development</label>
                                    </div>
                                    <div class="checkbox-item">
                                        <input type="checkbox" id="Cybersecu" name="Interests" value="Cybersecy"/>
                                        <label for="Cybersec">Cyber Security</label>
                                    </div>
                                    <div class="checkbox-item">
                                        <input type="checkbox" id="Ethicalhack" name="Interests" value="Ethicalhac"/>
                                        <label for="Ethicalhac">Ethical Hacking</label>
                                    </div>
                                    <div class="checkbox-item">
                                        <input type="checkbox" id="Javadev" name="Interests" value="Javadev"/>
                                        <label for="Javadev">Java Developer</label>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group full-width">
                                <label for="message">Additional Comments</label>
                                <textarea id="message" name="message" placeholder="Tell us about Your goals..."></textarea>
                            </div>
                            <div class="form-group full-width">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="terms" name="terms" required><label for="terms">I agree to the Terms and Condition</label>
                                </div>
                            </div>
                            <div class="btn-group">
                                <button type="submit" class="btn-primary">
                                    Submit Application
                                </button>
                                <button type="reset" class="btn-seconadary">Clear Form</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </body>
    </html>
