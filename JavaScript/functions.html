        <script>
            //1.function declaration
            function showMessage(){

            }
            
            function showMessageone(message){
                return 'this is message'+message;
            }
            //2.function call
            console.log(showMessageone('how you doing?'))
            //3.function expression
            const multiply=function(a,b){
                return a*b
            }
            console.log(multiply(5,5))
            //4.Arrow functions
            //4.1Basic Arrow functions
            const subtract=(a,b)=>{
                return a-b;
                console.log(subtract(10,5))

            }
            //4.2 Short hand arrow functions
            const devide=(a,b)=>a/b;
            console.log(devide(8,2))

            //4.3 no parameter
            const sayHello = () => console.log('hello Sukanya')
            console.log(sayHello())
