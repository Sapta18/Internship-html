<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Register Form</title>
    </head>
    <body>
        <center>
        <h2>Register Page</h2>
        <form>
            <label >Full Name</label><br>
            <input type="text" placeholder="Enter Your FullName" required><br><br>
            <label >Email:</label><br>
            <input type="email" placeholder="Enter Your Email" required><br><br>
            <label >Password:</label><br>
            <input type="password" placeholder="Enter Your Password" required><br><br>
            <label >Conform Password:</label><br>
            <input type="password" placeholder="Conform Password" required><br><br>
            <input type="submit" value="Register">
        </form>
        <p>Already have an account?
            <a href="login.html">Login Here</a>
        </p>
        </center>
    </body>
</html>
